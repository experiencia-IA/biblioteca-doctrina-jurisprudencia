<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Biblioteca de Doctrina y Jurisprudencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta Institucional Profesional */
            --bg-light: #f4f6f8; 
            --primary: #0f2c59; /* Azul Marino Judicial */
            --primary-light: #1e4585; 
            --accent: #b08d57; /* Bronce/Dorado sutil */
            --text-main: #2c3338;
            --text-muted: #6c7a89;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-light); 
            color: var(--text-main); 
            overflow: hidden; 
            min-height: 100vh; 
            font-family: 'Inter', sans-serif;
        }

        /* Landing Page Refinada */
        #landing-page {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center; padding: 20px;
            background: linear-gradient(135deg, var(--bg-light) 0%, #e8ecef 100%);
        }
        #landing-page h1 { 
            font-family: 'Merriweather', serif;
            color: var(--primary);
            font-size: 3rem; 
            font-weight: 700; 
            letter-spacing: -0.5px; 
            border-bottom: 3px solid var(--accent); 
            padding-bottom: 15px; 
            margin-bottom: 20px;
            display: inline-block;
        }
        #landing-page h2 { 
            color: var(--primary-light); 
            font-family: 'Inter', sans-serif; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 1.1rem; 
            margin-bottom: 40px; 
            font-weight: 500;
        }

        .desarrollo-status {
            font-family: 'Inter', sans-serif;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            background: #ffffff;
            padding: 12px 24px;
            border-radius: 4px;
            border: 1px solid #d1d9e0;
            box-shadow: 0 4px 12px -2px rgba(15, 44, 89, 0.08);
        }
        
        @media (max-width: 768px) {
            #landing-page h1 { font-size: 2rem; border-bottom-width: 2px; }
            #landing-page h2 { font-size: 0.95rem; margin-bottom: 30px; }
            .desarrollo-status { font-size: 1rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <div id="landing-page">
        <h1>Biblioteca de Doctrina y Jurisprudencia</h1>
        <h2>Defensoria Civil y Comercial Nº 6 Ministerio Público</h2>
        <div class="desarrollo-status">
            En desarrollo de la aplicación.
        </div>
    </div>

</body>
</html>
